    .card-example { font-family: monospace; font-size: 0.77rem; color: #6ee7b7; background: #0a1510; padding: 8px 11px; border-radius: 7px; border-left: 3px solid #4ade80; word-break: break-all; line-height: 1.5; margin-bottom: 12px; }

    .modal-name { color: #ccc; font-size: 0.9rem; }

    .modal-close:hover { color: #fff; }
    .modal-body { overflow-y: auto; padding: 22px; flex: 1; }
    .modal-body pre { font-family: monospace; font-size: 0.82rem; color: #c0cce0; background: #0f0f18; padding: 16px; border-radius: 10px; border: 1px solid #2a2a3a; white-space: pre-wrap; word-break: break-word; line-height: 1.7; }
    .modal-footer { padding: 14px 22px; border-top: 1px solid #2a2a3a; display: flex; gap: 10px; justify-content: flex-end; }
    .btn-primary { background: #a78bfa; color: #fff; border: none; padding: 8px 18px; border-radius: 8px; font-size: 0.82rem; cursor: pointer; transition: background 0.2s; }

    .btn-secondary:hover { color: #fff; border-color: #555; }

1. 確認狀態：目前 branch、哪些檔案有變更、這次 commit 目的。
2. 產出 commit message：
   - 格式：type(scope): 中文說明
   - type：feat / fix / chore / refactor / docs / style / test
3. 確認是否需要開新 branch：feat/xxx、fix/xxx、hotfix/xxx。
4. 說明推送步驟：git add、git commit、git push origin branch-name。
5. 確認是否需要開 PR：標題、描述摘要、review 重點、merge 前確認。
6. 最後輸出：
   - commit message 建議
   - branch 名稱建議
   - 推送指令
   - PR 描述草稿`

# /vercel-deploy

當使用者輸入 /vercel-deploy 時，請依序執行：

1. 確認部署範圍：preview 還是 production、哪個 branch、有無新 env。
2. 部署前檢查：.env.example 更新、Vercel env 同步、build 無錯誤、Supabase URL 正確。
3. 部署步驟：git push origin main 或手動 vercel --prod。
4. 部署後驗證：首頁、預約、Supabase 連線、LINE webhook、env 未洩漏。
5. 若部署失敗：看 build log、確認 Node 版本、npm build 指令、回滾到上一個部署。
6. 最後輸出：
   - 部署前 checklist
   - 部署指令
   - 驗收清單
   - 失敗排查方向`

const badgeClass = {
  plan:"badge-plan", db:"badge-db", auto:"badge-auto", test:"badge-test",
  ui:"badge-ui", deploy:"badge-deploy", store:"badge-store", payment:"badge-payment",
  customer:"badge-customer", marketing:"badge-marketing", ai:"badge-ai"
};

let activeTag = "all";
let currentContent = "";

function openModal(w) {
  document.getElementById("modal-cmd").textContent = w.cmd;
  document.getElementById("modal-name").textContent = "— " + w.name;
  document.getElementById("modal-content").textContent = w.content;
  currentContent = w.content;
  document.getElementById("modal-overlay").classList.add("open");
  document.body.style.overflow = "hidden";
}

function closeModal() {
  document.getElementById("modal-overlay").classList.remove("open");
  document.body.style.overflow = "";
}

function closeModalOutside(e) {
  if (e.target === document.getElementById("modal-overlay")) closeModal();
}

function copyContent() {
  navigator.clipboard.writeText(currentContent).then(() => {
    const btn = document.querySelector(".btn-secondary");
    btn.textContent = "✓ 已複製！";
    setTimeout(() => btn.textContent = "複製 .md 內容", 1500);
  });
}

function copyExample(text, btn) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = "✓ 已複製";
    setTimeout(() => btn.textContent = "複製指令", 1500);
  });
}

function renderCards(data) {
  const grid = document.getElementById("grid");
  const empty = document.getElementById("empty");
  document.getElementById("stat-showing").textContent = data.length;
  grid.innerHTML = "";
  if (data.length === 0) { empty.style.display = "block"; return; }
  empty.style.display = "none";
  data.forEach(w => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <div class="card-header">
        <span class="cmd">${w.cmd}</span>
        <span class="badge ${badgeClass[w.badge]}">${w.badgeLabel}</span>
      </div>
      <div class="card-title">${w.name}</div>
      <div class="card-desc">${w.desc}</div>
      <div class="example-label">觸發範例</div>
      <div class="card-example">${w.example}</div>
      <div class="card-actions">
        <button class="btn btn-copy" onclick="copyExample('${w.example}', this)">複製指令</button>
        <button class="btn btn-view" onclick="openModal(workflows.find(x=>x.cmd==='${w.cmd}'))">查看 .md 內容</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterCards() {
  const q = document.getElementById("search").value.toLowerCase();
  const filtered = workflows.filter(w =>
    (activeTag === "all" || w.tag === activeTag) &&
    (w.cmd.includes(q) || w.name.includes(q) || w.desc.includes(q) || w.example.includes(q) || w.content.toLowerCase().includes(q))
  );
  renderCards(filtered);
}

function filterTag(tag, el) {
  activeTag = tag;
  document.querySelectorAll(".tag").forEach(t => t.classList.remove("active"));
  el.classList.add("active");
  filterCards();
}

document.addEventListener("keydown", e => { if (e.key === "Escape") closeModal(); });
renderCards(workflows);
</script>
