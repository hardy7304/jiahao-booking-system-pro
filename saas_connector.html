    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      background: #0f1117;
      color: #e2e8f0;

    }

    .container {
      max-width: 1600px;

    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f8fafc;
    }

    .subtitle {
      font-size: 0.9rem;

      padding: 10px 14px;
      background: #1e293b;
      border-left: 3px solid #6366f1;
      border-radius: 4px;
    }

    /* Filter bar */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 20px;
      align-items: center;
    }

    .filter-bar input {
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 0.9rem;
      width: 240px;
      outline: none;
      transition: border-color 0.2s;
    }
    .filter-bar input:focus { border-color: #6366f1; }

    .filter-btn {
      padding: 7px 16px;
      border-radius: 20px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #94a3b8;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn:hover, .filter-btn.active {
      background: #6366f1;
      border-color: #6366f1;
      color: #fff;
    }

    .count-label {
      margin-left: auto;
      font-size: 0.82rem;
      color: #64748b;
    }

    /* Table */
    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #1e293b;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.855rem;
    }

    thead tr {
      background: #1e293b;
    }

    th {
      padding: 12px 14px;
      text-align: left;
      font-weight: 600;
      color: #94a3b8;
      white-space: nowrap;
      border-bottom: 1px solid #334155;
      position: sticky;
      top: 0;
      background: #1e293b;
      z-index: 2;
    }

    tbody tr {
      border-bottom: 1px solid #1e293b;
      transition: background 0.15s;
    }
    tbody tr:hover { background: #1a2332; }
    tbody tr.hidden { display: none; }

    td {
      padding: 11px 14px;
      vertical-align: top;
      color: #cbd5e1;
      line-height: 1.55;
    }

    td:first-child { font-weight: 600; color: #f1f5f9; white-space: nowrap; }

    /* Category badges */
    .cat-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
      white-space: nowrap;
    }

    .cat-comm     { background: #1e3a5f; color: #60a5fa; }
    .cat-sched    { background: #1c3d2e; color: #34d399; }
    .cat-db       { background: #3b2a5e; color: #a78bfa; }
    .cat-ai       { background: #3d2020; color: #f87171; }

    /* Stars */
    .stars { color: #fbbf24; letter-spacing: 1px; font-size: 0.85rem; white-space: nowrap; }
    .stars-none { color: #4b5563; font-size: 0.8rem; }

    .detail { max-width: 300px; color: #94a3b8; font-size: 0.82rem; }
    .reason { max-width: 260px; color: #64748b; font-size: 0.80rem; font-style: italic; }

    /* Ignore section styling */
    tr.ignore-row td { opacity: 0.55; }
    tr.ignore-row td:first-child { opacity: 0.7; }

    /* Stats cards */
    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 22px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 12px 18px;
      min-width: 130px;
    }
    .stat-card .val { font-size: 1.6rem; font-weight: 700; color: #f8fafc; }
    .stat-card .lbl { font-size: 0.78rem; color: #64748b; margin-top: 2px; }
  </style>
</head>

const catClass = {
  "🏢 其他 (忽略區)": "cat-other",
  "💬 通訊與客服": "cat-comm",
  "📅 預約與排程": "cat-sched",
  "🗄️ 資料庫與儲存": "cat-db",
  "🤖 AI 與爬蟲": "cat-ai"
};

let currentFilter = 'all';

function renderTable(rows) {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = '';
  rows.forEach(d => {
    const isIgnore = d.cat === '🏢 其他 (忽略區)';
    const noteCell = isIgnore ? d.reason : (d.reason || '');
    const tr = document.createElement('tr');
    if (isIgnore) tr.classList.add('ignore-row');
    tr.dataset.cat = d.cat;
    tr.innerHTML = `
      <td>${d.name}</td>
      <td><span class="cat-badge ${catClass[d.cat] || ''}">${d.cat}</span></td>
      <td>${d.func}</td>
      <td>${d.scene || '<span style="color:#4b5563">—</span>'}</td>
      <td>${d.stars ? `<span class="stars">${d.stars}</span>` : '<span class="stars-none">忽略</span>'}</td>
      <td class="detail">${d.detail || '<span style="color:#4b5563">—</span>'}</td>
      <td class="reason">${noteCell || '<span style="color:#4b5563">—</span>'}</td>
    `;
    tbody.appendChild(tr);
  });
  document.getElementById('showing-count').textContent = `顯示 ${rows.length} / ${data.length} 筆`;
}

function applyFilters() {
  const q = document.getElementById('search-input').value.toLowerCase();
  let filtered = data.filter(d => {
    const matchCat = currentFilter === 'all' || d.cat === currentFilter;
    const matchQ = !q || [d.name, d.func, d.scene, d.detail, d.reason].some(s => s && s.toLowerCase().includes(q));
    return matchCat && matchQ;
  });
  renderTable(filtered);
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
}

// Init
renderTable(data);
document.getElementById('total-count').textContent = data.length;
document.getElementById('five-star-count').textContent = data.filter(d => d.stars === '⭐⭐⭐⭐⭐').length + ' 個工具';
document.getElementById('ignore-count').textContent = data.filter(d => d.cat === '🏢 其他 (忽略區)').length + ' 個工具';
</script>
